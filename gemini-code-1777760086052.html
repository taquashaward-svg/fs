<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA National Lucky Draw | Official Entry</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <h1 class="logo">USA<span>DRAW</span></h1>
            <div class="nav-links">
                <a href="#apply">Enter Now</a>
                <a href="#results">Check Results</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h2>Enter the 2026 Free Lucky Draw</h2>
            <p>No purchase necessary. Complete your secure verification to receive your digital ticket.</p>
        </section>

        <form id="entryForm" class="form-card">
            <div class="form-grid">
                <!-- Personal Info -->
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com" required>
                </div>
                <div class="input-group">
                    <label>Contact Number</label>
                    <input type="tel" placeholder="+1 (555) 000-0000" required>
                </div>
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" required>
                </div>

                <!-- Verification Uploads -->
                <div class="upload-section">
                    <label>ID Card / Driver's License (Front)</label>
                    <input type="file" accept="image/*" required>
                </div>
                <div class="upload-section">
                    <label>ID Card / Driver's License (Back)</label>
                    <input type="file" accept="image/*" required>
                </div>
                <div class="upload-section full-width">
                    <label>Live Selfie Verification</label>
                    <input type="file" accept="image/*" capture="user" required>
                </div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I certify that I am a US resident over 18 and agree to the <a href="#">Official Rules</a>.</label>
            </div>

            <button type="submit" class="btn-submit">Submit Application</button>
        </form>
    </main>

    <footer class="footer">
        <p>&copy; 2026 USA Lucky Draw Administration. All rights reserved.</p>
    </footer>

</body>
</html>
